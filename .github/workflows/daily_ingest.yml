name: Daily ELT Ingestion Pipeline

on:
  schedule:
    - cron: '0 6 * * *'  # Trigger automatically every day at 6 AM UTC
  workflow_dispatch:      # Allows you to manually trigger it by clicking a button in GitHub

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Speeds up future workflow executions

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Extraction and Load Script
        env:
          SNOW_ACCOUNT: ${{ secrets.SNOW_ACCOUNT }}
          SNOW_USER: ${{ secrets.SNOW_USER }}
          SNOW_PASS: ${{ secrets.SNOW_PASS }}
          CG_API_KEY: ${{ secrets.CG_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python scripts/extract_load.py