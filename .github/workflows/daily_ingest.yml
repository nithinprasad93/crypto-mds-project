name: Executing Daily Crypto Data Pipeline

on:
  schedule:
    - cron: '0 6 * * *' # Runs every day at 6:00 AM UTC
  workflow_dispatch: # Allows you to press a button in GitHub to run it manually

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- STEP 1: PYTHON INGESTION ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Run Python Ingest Script
        env:
          SNOW_ACCOUNT: ${{ secrets.SNOW_ACCOUNT }}
          SNOW_USER: ${{ secrets.SNOW_USER }}
          SNOW_PASS: ${{ secrets.SNOW_PASS }}
          CG_API_KEY: ${{ secrets.CG_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          pip install -r requirements.txt
          python scripts/extract_load.py

      # --- STEP 2: TRIGGER dbt CORE / dbt CLOUD ---
      # Option A: If you are using dbt Cloud, we call their API webhook to run the transformation
      - name: Trigger dbt Cloud Job
        run: |
          curl -f -X POST \
            -H "Authorization: Token ${{ secrets.DBT_CLOUD_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"cause": "Triggered by GitHub Actions"}' \
            https://oh068.us1.dbt.com/api/v2/accounts/${{ secrets.DBT_ACCOUNT_ID }}/jobs/${{ secrets.DBT_JOB_ID }}/run/

      # --- STEP 3: REFRESH EVIDENCE VISUALIZATION ---
      # Once dbt finishes, we ping Vercel to fetch the fresh Snowflake tables
      - name: Trigger Vercel Dashboard Build
        run: |
          curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}